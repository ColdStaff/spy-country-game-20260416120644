<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 840">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ece7dd"/>
      <stop offset="1" stop-color="#d8d1c2"/>
    </linearGradient>
    <radialGradient id="shade" cx="50%" cy="30%" r="75%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.12"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="51"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.07"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1400" height="840" fill="url(#paper)"/>
  <rect x="22" y="18" width="1356" height="804" rx="10" fill="none" stroke="#b6ae9f" stroke-width="2" opacity="0.6"/>
  <rect width="1400" height="840" fill="url(#shade)"/>
  <rect width="1400" height="840" filter="url(#grain)"/>
</svg>
