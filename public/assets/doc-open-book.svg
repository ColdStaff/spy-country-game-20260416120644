<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 840">
  <defs>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e5ddcf"/>
      <stop offset="1" stop-color="#f1ebdd"/>
