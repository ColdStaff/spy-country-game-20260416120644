<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 840">
  <defs>
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4c5ae"/>
      <stop offset="1" stop-color="#bead90"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0e8d9"/>
      <stop offset="1" stop-color="#ddd2bf"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.84" numOctaves="2" seed="23"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1400" height="840" fill="url(#folder)"/>
  <rect x="82" y="68" width="1236" height="706" rx="12" fill="url(#paper)" stroke="#a89577" stroke-width="3"/>

  <line x1="130" y1="142" x2="1270" y2="142" stroke="#9a8d78" stroke-width="2" opacity="0.42"/>
  <g stroke="#9a8d78" stroke-width="2" opacity="0.26">
    <line x1="130" y1="196" x2="1270" y2="196"/>
    <line x1="130" y1="244" x2="1270" y2="244"/>
    <line x1="130" y1="292" x2="1270" y2="292"/>
    <line x1="130" y1="340" x2="1270" y2="340"/>
    <line x1="130" y1="388" x2="1270" y2="388"/>
    <line x1="130" y1="436" x2="1270" y2="436"/>
    <line x1="130" y1="484" x2="1270" y2="484"/>
    <line x1="130" y1="532" x2="1270" y2="532"/>
    <line x1="130" y1="580" x2="1270" y2="580"/>
    <line x1="130" y1="628" x2="1270" y2="628"/>
    <line x1="130" y1="676" x2="1270" y2="676"/>
  </g>

  <g transform="translate(1088 706) rotate(-10)" opacity="0.72">
