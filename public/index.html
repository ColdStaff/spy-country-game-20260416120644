<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Теневая Республика</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Russo+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Теневая Республика</h1>
      <div id="connectionState" class="pill">Подключение...</div>
    </header>

    <section id="screen-auth" class="screen visible">
      <div class="panel split">
        <div>
          <h2>Создай политика</h2>
          <p class="muted">Введи ник и внешний вид, чтобы войти в игру.</p>
          <label class="field">
            <span>Никнейм</span>
            <input id="nicknameInput" type="text" maxlength="24" placeholder="Например, МинистрСевера" />
          </label>
          <button id="registerBtn" class="btn primary">Войти</button>
        </div>
        <div>
          <h3>Внешность</h3>
          <div id="avatarPreview" class="avatar avatar-lg"></div>
          <div class="grid-2">
            <label class="field"><span>Кожа</span><select id="skinSelect"></select></label>
            <label class="field"><span>Прическа</span><select id="hairStyleSelect"></select></label>
            <label class="field"><span>Волосы</span><select id="hairColorSelect"></select></label>
            <label class="field"><span>Одежда</span><select id="outfitColorSelect"></select></label>
            <label class="field"><span>Фон</span><select id="bgColorSelect"></select></label>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-lobby" class="screen">
      <div class="panel split">
        <div>
          <h2>Создать комнату</h2>
          <label class="field"><span>Название</span><input id="createRoomName" type="text" maxlength="42" placeholder="Кабинет реформ" /></label>
          <label class="field"><span>Пароль (опционально)</span><input id="createRoomPassword" type="text" maxlength="30" /></label>
          <label class="field"><span>Лимит игроков</span><input id="createRoomMax" type="number" min="2" max="20" value="20" /></label>
          <button id="createRoomBtn" class="btn primary">Создать комнату</button>

          <h3>Вход по коду</h3>
          <label class="field"><span>Код комнаты</span><input id="joinCodeInput" type="text" maxlength="12" placeholder="ABC123" /></label>
          <label class="field"><span>Пароль</span><input id="joinPasswordInput" type="text" maxlength="30" /></label>
          <button id="joinByCodeBtn" class="btn">Подключиться</button>
        </div>
        <div>
          <h2>Открытые комнаты</h2>
          <div id="roomsList" class="room-list"></div>
        </div>
      </div>
    </section>

    <section id="screen-room" class="screen">
      <div class="panel">
        <div class="inline-row between">
          <h2 id="roomTitle">Комната</h2>
          <div class="inline-row">
            <span id="roomCodeBadge" class="pill"></span>
            <button id="copyRoomCodeBtn" class="btn tiny">Копировать код</button>
          </div>
        </div>

        <div id="roomPlayers" class="player-grid"></div>

        <div id="hostControls" class="host-controls hidden">
          <h3>Настройки хоста</h3>
          <div class="grid-2">
            <label class="field"><span>Название</span><input id="hostRoomName" type="text" maxlength="42" /></label>
            <label class="field"><span>Пароль</span><input id="hostRoomPassword" type="text" maxlength="30" /></label>
            <label class="field"><span>Лимит игроков</span><input id="hostRoomMax" type="number" min="2" max="20" /></label>
            <label class="field"><span>Закрыть комнату</span><input id="hostRoomLock" type="checkbox" /></label>
          </div>
          <div class="inline-row">
            <button id="saveRoomSettingsBtn" class="btn">Сохранить</button>
            <button id="startGameBtn" class="btn danger">Начать матч</button>
          </div>
        </div>

        <button id="leaveRoomBtn" class="btn">Выйти в лобби</button>
      </div>
    </section>

    <section id="screen-game" class="screen">
      <div class="game-layout">
        <div class="panel">
          <div class="inline-row">
            <span id="dayBadge" class="pill"></span>
            <span id="phaseBadge" class="pill"></span>
            <span id="roleBadge" class="pill"></span>
          </div>
          <div id="phaseHint" class="muted"></div>
        </div>

        <div class="panel" id="globalProblem"></div>

        <div class="panel" id="statsGrid"></div>

        <div class="panel hidden" id="spyTeam"></div>
        <div class="panel hidden" id="spyOrders"></div>

        <div class="panel">
          <div id="eventCard" class="card-note"></div>
          <div id="storyCard" class="card-note"></div>
        </div>

        <div class="panel">
          <div class="inline-row between">
            <h3>Карточки решений</h3>
            <button id="historyToggleBtn" class="btn tiny">История прошлых раундов</button>
          </div>
          <div id="cardsBoard" class="cards-board"></div>
          <div id="phaseActions" class="inline-row"></div>
        </div>

        <div id="historyPanel" class="panel hidden">
          <h3>История решений</h3>
          <div id="historyList" class="history-list"></div>
        </div>

        <div class="panel">
          <h3>Арест</h3>
          <div class="inline-row">
            <select id="arrestSelect"></select>
            <button id="arrestVoteBtn" class="btn tiny">Голосовать</button>
            <button id="arrestSkipBtn" class="btn tiny">Пропустить</button>
          </div>
          <div id="arrestStatus" class="muted"></div>
        </div>

        <div class="panel">
          <h3>Новости</h3>
          <div id="newsFeed" class="news-feed"></div>
        </div>

        <div class="panel">
          <div class="inline-row">
            <button id="chatPublicTab" class="btn tiny primary">Общий чат</button>
            <button id="chatSpyTab" class="btn tiny">Шпионский чат</button>
          </div>
          <div id="chatMessages" class="chat-messages"></div>
          <div class="inline-row">
            <input id="chatInput" type="text" maxlength="300" placeholder="Сообщение..." />
            <button id="sendChatBtn" class="btn tiny">Отправить</button>
          </div>
        </div>
      </div>
    </section>

    <div id="toast" class="toast hidden"></div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
